version: "3.9"

# =============================================================================
# LogiTrack — unified Compose file
#
# Profiles
# --------
#   (no profile)  — core infrastructure only: postgres, minio, redis
#   dev           — adds adminer UI (development convenience)
#   prod          — adds backend, frontend, nginx, mlflow  (production stack)
#
# Quick start
# -----------
#   Development:  docker compose --profile dev up -d
#   Production:   docker compose --profile prod up -d
#
# All secrets come from environment variables / .env — never hardcoded.
# =============================================================================

networks:
  logitrack-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  mlflow_data:

# =============================================================================
# CORE INFRASTRUCTURE  (always started)
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: logitrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logitrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (model artefacts + PDF reports)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: logitrack_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - logitrack-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis 7 — rate-limiting storage + token-blacklist cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: logitrack_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - logitrack-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# DEV PROFILE
# =============================================================================

  # ---------------------------------------------------------------------------
  # Adminer — lightweight DB inspection UI (dev only)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: logitrack_adminer
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - logitrack-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

# =============================================================================
# PROD PROFILE
# =============================================================================

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: logitrack_backend
    restart: unless-stopped
    profiles: [prod]
    env_file: .env
    environment:
      # Override connection hosts to use Docker service names
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SYNC_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT_URL:   http://minio:9000
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT:       production
    networks:
      - logitrack-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    expose:
      - "8000"

  # ---------------------------------------------------------------------------
  # React frontend (nginx serving /dist, proxying /api → backend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: logitrack_frontend
    restart: unless-stopped
    profiles: [prod]
    networks:
      - logitrack-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "80"

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy + SSL termination
  # Self-signed cert for dev; replace /etc/nginx/ssl/ with real certs in prod.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: logitrack_nginx
    restart: unless-stopped
    profiles: [prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro          # mount TLS cert + key
    networks:
      - logitrack-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # MLflow — experiment tracking server
  # Backend store: PostgreSQL (same cluster, dedicated DB)
  # Artifact store: MinIO/S3
  # UI: http://localhost:5050 (mapped for dev access; behind nginx in prod)
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    container_name: logitrack_mlflow
    restart: unless-stopped
    profiles: [prod]
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLFLOW_DB:-mlflow}
      --default-artifact-root s3://${S3_BUCKET_NAME:-logitrack}/mlflow-artifacts
      --host 0.0.0.0
      --port 5050
    environment:
      MLFLOW_S3_ENDPOINT_URL:     http://minio:9000
      AWS_ACCESS_KEY_ID:          ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY:      ${MINIO_ROOT_PASSWORD}
      MLFLOW_TRACKING_URI:        http://mlflow:5050
    ports:
      - "${MLFLOW_PORT:-5050}:5050"
    networks:
      - logitrack-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
