# =============================================================================
# LogiTrack nginx configuration
# Used by:
#   1. docker/Dockerfile.frontend  — as the site config inside the frontend container
#   2. The standalone 'nginx' reverse-proxy service in docker-compose.yml (prod profile)
#
# Architecture (production):
#   Client → nginx:443 (SSL termination) → backend:8000  (/api/, /auth/, /docs, /health)
#                                         → frontend:80  (everything else)
#
# Development (single container):
#   Client → frontend container:80 → backend:8000 (proxy_pass for /api/, /auth/)
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream definitions
# ---------------------------------------------------------------------------
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Gzip settings (shared)
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    font/truetype
    font/opentype
    image/svg+xml;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (production reverse proxy)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Allow liveness probes on plain HTTP
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main server block (production reverse proxy)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name _;

    # SSL certificates — mount at /etc/nginx/ssl/ via Docker volume or secret
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (supplement those set by the FastAPI middleware)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 16m;

    # -----------------------------------------------------------------------
    # Backend routes
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /auth/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ ^/(docs|redoc|openapi\.json|health) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket support (future KPI push endpoint)
    location /ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # -----------------------------------------------------------------------
    # Frontend — React SPA
    # -----------------------------------------------------------------------
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass through 404 → index.html so the SPA router handles the path
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
    }
}
